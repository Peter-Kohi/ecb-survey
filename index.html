<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cảm ơn bạn đã tham gia khảo sát!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 56px; margin-bottom: 1.25rem; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    p {
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }
    .brand {
      font-weight: 600;
      color: #534AB7;
    }
    .sub {
      font-size: 13px;
      color: #888;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Cảm ơn bạn đã hoàn thành khảo sát!</h1>
    <p>Ý kiến của bạn sẽ giúp <span class="brand">ECB / Ecombox</span> ngày càng hoàn thiện hơn.</p>
    <p>Nhóm mình trân trọng sự đóng góp của bạn rất nhiều! ✨</p>
    <p class="sub">Chúc bạn một ngày tuyệt vời ~ 🥳</p>
  </div>

  <script>
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const colors = ['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#EF9F27','#639922','#F0997B','#5DCAA5'];
    const pieces = Array.from({ length: 150 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight - window.innerHeight,
      w: Math.random() * 10 + 5,
      h: Math.random() * 5 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 3 + 1.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4,
      drift: (Math.random() - 0.5) * 1.5
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
        p.y += p.speed;
        p.x += p.drift;
        p.angle += p.spin;
        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
